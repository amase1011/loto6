<!doctype html>
<html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#111827"><title>ロト6分析</title><link rel="stylesheet" href="/style.css"></head>
<body><header><h1>ロト6分析</h1><p>過去データ分析・候補生成</p></header><main id="captureArea">
<div class="notice">過去データの統計ツールです。当選を予測・保証するものではありません。取得データは個人利用向けです。</div>
<section class="card"><div class="actions"><button id="loadBtn">データ取得・更新</button><button id="pngBtn" class="secondary">分析結果をPNG保存</button></div><p id="status">「データ取得・更新」を押してください。</p></section>
<section class="summary" id="summary"></section>
<section class="card"><h2>分析範囲</h2><div class="row"><select id="period"><option value="all">全期間</option><option value="10">直近10回</option><option value="50">直近50回</option><option value="100">直近100回</option><option value="300">直近300回</option></select><select id="sort"><option value="number">数字順</option><option value="rateDesc">出現率が高い順</option><option value="rateAsc">出現率が低い順</option><option value="overdueDesc">未出現期間が長い順</option><option value="allDesc">全期間の出現回数順</option></select></div></section>
<section class="card"><h2>数字別統計</h2><div class="tableWrap"><table><thead><tr><th>数字</th><th>出現回数</th><th>出現率</th><th>未出現</th><th>平均間隔</th></tr></thead><tbody id="statsBody"></tbody></table></div></section>
<div class="grid"><section class="card"><h2>ホット数字</h2><div id="hot" class="balls"></div></section><section class="card"><h2>長期未出現</h2><div id="cold" class="balls"></div></section></div>
<div class="grid"><section class="card"><h2>奇数個数の分布</h2><div id="oddDist"></div></section><section class="card"><h2>合計値の分布</h2><div id="sumDist"></div></section></div>
<section class="card"><h2>直近10回</h2><div id="recent"></div></section>
<section class="card"><h2>候補生成</h2><div class="formGrid"><label>口数<input id="ticketCount" type="number" value="5" min="1" max="20"></label><label>合計最小<input id="minSum" type="number" value="90"></label><label>合計最大<input id="maxSum" type="number" value="175"></label><label>最大重複<select id="overlap"><option>2</option><option selected>3</option><option>4</option></select></label></div><button id="generateBtn">候補を生成</button><div id="candidates"></div></section>
</main><footer>データ元：KYO's LOTO6 公開CSV（個人利用向け）</footer><script src="/app.js"></script></body></html>
